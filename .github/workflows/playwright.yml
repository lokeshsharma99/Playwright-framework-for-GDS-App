name: Playwright BDD UI Tests — GDS Demo App

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    # Run daily at 06:00 UTC against the live deployed app
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser project (chromium / firefox / webkit / all)'
        required: false
        default: 'chromium'
      tags:
        description: 'Cucumber tag filter (e.g. @smoke, @e2e, @validation)'
        required: false
        default: ''

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright-bdd-tests:
    name: BDD Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Generate BDD test files
        run: npx bddgen

      - name: Run BDD tests (${{ matrix.browser }})
        run: npx playwright test --project=${{ matrix.browser }} ${{ inputs.tags && format('--grep {0}', inputs.tags) || '' }}
        env:
          CI: true

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: BDD Results — ${{ matrix.browser }}
          path: test-results/junit.xml
          reporter: jest-junit
          fail-on-error: false

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 14

      - name: Upload failure traces and screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces-${{ matrix.browser }}
          path: test-results/
          retention-days: 7

  smoke-tests:
    name: Smoke Tests (Chromium only)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Generate BDD test files
        run: npx bddgen
      - name: Run @smoke scenarios only
        run: npx playwright test --project=chromium --grep @smoke
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-report
          path: playwright-report/
          retention-days: 7

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [playwright-bdd-tests]
    if: always()
    steps:
      - name: Write job summary
        run: |
          echo "## BDD Playwright Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** https://lokeshsharma99.github.io/GDS-Demo-App/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Browser  | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Chromium | ${{ needs.playwright-bdd-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Firefox  | ${{ needs.playwright-bdd-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| WebKit   | ${{ needs.playwright-bdd-tests.result }} |" >> $GITHUB_STEP_SUMMARY

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    # Run daily at 06:00 UTC against the live deployed app
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser project(s) to run (chromium / firefox / webkit / all)'
        required: false
        default: 'chromium'

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright-tests:
    name: Playwright E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Playwright tests (${{ matrix.browser }})
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          CI: true

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Playwright Results — ${{ matrix.browser }}
          path: test-results/junit.xml
          reporter: jest-junit
          fail-on-error: false

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 14

      - name: Upload failure traces and screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces-${{ matrix.browser }}
          path: test-results/
          retention-days: 7

  mobile-tests:
    name: Playwright E2E (Mobile)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium + WebKit for mobile)
        run: npx playwright install --with-deps chromium webkit

      - name: Run mobile tests
        run: npx playwright test --project=mobile-chrome --project=mobile-safari
        env:
          CI: true

      - name: Upload mobile test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-mobile
          path: playwright-report/
          retention-days: 14

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [playwright-tests, mobile-tests]
    if: always()

    steps:
      - name: Write job summary
        run: |
          echo "## Playwright Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Chromium | ${{ needs.playwright-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mobile   | ${{ needs.mobile-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** https://lokeshsharma99.github.io/GDS-Demo-App/" >> $GITHUB_STEP_SUMMARY

