name: Playwright BDD UI Tests — GDS Demo App

# Demo: run the @smoke suite; if it fails (e.g. a drifted locator), the
# AI auto-healer fixes the locator, validates by re-running, and opens a PR.
on:
  push:
    branches: [main, master, develop, test/auto-heal-demo]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

# contents: write       -> healer pushes its self-heal branch
# pull-requests: write  -> healer opens the fix PR
permissions:
  contents: write
  checks: write
  pull-requests: write

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright-bdd-tests:
    name: BDD Smoke Tests + Auto-heal
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate BDD test files
        run: npx bddgen

      # Run the smoke suite with traces. continue-on-error lets the job reach
      # the heal step instead of aborting on the first failure.
      - name: Run @smoke tests (Chromium)
        id: tests
        continue-on-error: true
        run: npx playwright test --project=chromium --grep @smoke --trace on
        env:
          CI: true

      # Only runs when the tests above failed. Installs the healer, lets it
      # detect the broken locator, fix it, re-validate (@smoke only), open a PR.
      - name: Auto-heal broken locators
        if: steps.tests.outcome == 'failure'
        env:
          AI_MODE: azure-openai
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          # The healer re-runs this command to confirm the fix really works.
          # Scoped to @smoke so the unrelated @xfail scenario is excluded.
          TEST_COMMAND: "npx playwright test --project=chromium --grep @smoke --trace on"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/bunnycodec/auto_healing_framework.git@feat/python-auto-healer"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          auto-healer heal test-results --auto-pr

      - name: Upload failure traces
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

      - name: Reflect test result
        if: always()
        run: |
          echo "Test step outcome: ${{ steps.tests.outcome }}"
          if [ "${{ steps.tests.outcome }}" = "failure" ]; then
            echo "Tests failed — the auto-healer ran. Check for a self-heal PR."
          fi
