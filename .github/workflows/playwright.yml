name: Playwright BDD UI Tests — GDS Demo App

# Demo: run the @smoke suite; if it fails (e.g. a drifted locator), the
# AI auto-healer fixes the locator, validates by re-running, and opens a PR.
on:
  push:
    branches: [main, master, develop, test/auto-heal-demo]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

# contents: write       -> healer pushes its self-heal branch
# pull-requests: write  -> healer opens the fix PR
permissions:
  contents: write
  checks: write
  pull-requests: write

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright-bdd-tests:
    name: BDD Smoke Tests + Auto-heal
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate BDD test files
        run: npx bddgen

      # Run the smoke suite with traces. continue-on-error lets the job reach
      # the heal step instead of aborting on the first failure.
      - name: Run @smoke tests (Chromium)
        id: tests
        continue-on-error: true
        run: npx playwright test --project=chromium --grep @smoke --trace on
        env:
          CI: true

      # Only runs when the tests above failed. Installs the healer, lets it
      # detect the broken locator, fix it, re-validate (@smoke only), open a PR.
      # continue-on-error: a healer infra hiccup must not mask the real signal
      # (tests failed) — the job color reflects the tests, the PR is remediation.
      - name: Auto-heal broken locators
        id: heal
        if: steps.tests.outcome == 'failure'
        continue-on-error: true
        env:
          AI_MODE: azure-openai
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          # The healer re-runs this command to confirm the fix really works.
          # Scoped to @smoke so the unrelated @xfail scenario is excluded.
          TEST_COMMAND: "npx playwright test --project=chromium --grep @smoke --trace on"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/bunnycodec/auto_healing_framework.git@feat/python-auto-healer"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Capture the healer output so we can surface any opened PR link.
          auto-healer heal test-results --auto-pr | tee heal-output.txt

      - name: Upload failure traces
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

      # Write a clear summary: tests failed and, if the healer opened a PR,
      # link to it directly from the run's Summary tab.
      - name: Summarise auto-heal result
        if: always()
        run: |
          echo "## Auto-heal summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Test step outcome: **${{ steps.tests.outcome }}**" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.tests.outcome }}" = "failure" ]; then
            echo "- Heal step outcome: **${{ steps.heal.outcome }}**" >> "$GITHUB_STEP_SUMMARY"
            PR_URL="$(grep -Eo 'https://github.com/[^ ]+/pull/[0-9]+' heal-output.txt | head -n1 || true)"
            if [ -n "$PR_URL" ]; then
              echo "- Self-heal PR: [$PR_URL]($PR_URL)" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- No PR was opened (no healable locator failure, or healer reported nothing to fix)." >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "- Tests passed — auto-heal not triggered." >> "$GITHUB_STEP_SUMMARY"
          fi
