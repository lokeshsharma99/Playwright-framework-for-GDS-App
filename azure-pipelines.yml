# Azure DevOps Pipelines — BDD Playwright UI Tests for GDS Demo App
# Framework: playwright-bdd (Cucumber/Gherkin) + Page Object Model
# Target: https://lokeshsharma99.github.io/GDS-Demo-App/

trigger:
  branches:
    include:
      - main
      - master
      - develop
  paths:
    include:
      - tests/**
      - playwright.config.ts
      - package*.json

pr:
  branches:
    include:
      - main
      - master

schedules:
  - cron: '0 6 * * *'
    displayName: Daily smoke run
    branches:
      include:
        - main
    always: true

parameters:
  - name: tagsFilter
    displayName: 'Cucumber tag filter (e.g. @smoke, @e2e, @validation)'
    type: string
    default: ''
  - name: browsers
    displayName: 'Browsers to test'
    type: object
    default:
      - chromium
      - firefox
      - webkit

variables:
  NODE_VERSION: '20.x'
  npm_config_cache: $(Pipeline.Workspace)/.npm

stages:
  # ─── Smoke Tests (PR gate) ────────────────────────────────────────────────
  - stage: SmokeTests
    displayName: 'Smoke Tests (PR gate)'
    condition: eq(variables['Build.Reason'], 'PullRequest')
    jobs:
      - job: Smoke
        displayName: 'BDD @smoke — Chromium'
        pool:
          vmImage: 'ubuntu-latest'
        timeoutInMinutes: 15
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
          - task: Cache@2
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: 'npm | "$(Agent.OS)"'
              path: $(npm_config_cache)
          - script: npm ci
            displayName: 'Install dependencies'
          - script: npx playwright install --with-deps chromium
            displayName: 'Install Playwright Chromium'
          - script: npx bddgen
            displayName: 'Generate BDD test files'
          - script: npx playwright test --project=chromium --grep @smoke
            displayName: 'Run @smoke BDD scenarios'
            env:
              CI: 'true'
          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'test-results/junit.xml'
              testRunTitle: 'BDD Smoke Tests — Chromium'
          - task: PublishPipelineArtifact@1
            condition: always()
            inputs:
              targetPath: 'playwright-report'
              artifact: 'smoke-report-chromium'
              publishLocation: 'pipeline'

  # ─── Full BDD Regression ─────────────────────────────────────────────────
  - stage: FullRegression
    displayName: 'Full BDD Regression'
    dependsOn: []
    condition: not(eq(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - job: BDDTests
        displayName: 'BDD Tests — ${{ parameters.browsers }}
        strategy:
          matrix:
            Chromium:
              BROWSER: chromium
            Firefox:
              BROWSER: firefox
            WebKit:
              BROWSER: webkit
        pool:
          vmImage: 'ubuntu-latest'
        timeoutInMinutes: 30
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
          - task: Cache@2
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: 'npm | "$(Agent.OS)"'
              path: $(npm_config_cache)
          - script: npm ci
            displayName: 'Install dependencies'
          - script: npx playwright install --with-deps $(BROWSER)
            displayName: 'Install Playwright $(BROWSER)'
          - script: npx bddgen
            displayName: 'Generate BDD test files from .feature files'
          - script: |
              GREP_ARG=""
              if [ -n "${{ parameters.tagsFilter }}" ]; then
                GREP_ARG="--grep ${{ parameters.tagsFilter }}"
              fi
              npx playwright test --project=$(BROWSER) $GREP_ARG
            displayName: 'Run BDD scenarios — $(BROWSER)'
            env:
              CI: 'true'
          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'test-results/junit.xml'
              testRunTitle: 'BDD Regression — $(BROWSER)'
              failTaskOnFailedTests: true
          - task: PublishPipelineArtifact@1
            condition: always()
            inputs:
              targetPath: 'playwright-report'
              artifact: 'playwright-report-$(BROWSER)'
              publishLocation: 'pipeline'
          - task: PublishPipelineArtifact@1
            condition: failed()
            inputs:
              targetPath: 'test-results'
              artifact: 'playwright-traces-$(BROWSER)'
              publishLocation: 'pipeline'
# Runs tests against: https://lokeshsharma99.github.io/GDS-Demo-App/

trigger:
  branches:
    include:
      - main
      - master
      - develop
  paths:
    include:
      - tests/**
      - playwright.config.ts
      - package*.json

pr:
  branches:
    include:
      - main
      - master

schedules:
  - cron: '0 6 * * *'
    displayName: Daily smoke run
    branches:
      include:
        - main
    always: true

variables:
  NODE_VERSION: '20.x'
  npm_config_cache: $(Pipeline.Workspace)/.npm

stages:
  # ─── Desktop Browsers ───────────────────────────────────────────────────────
  - stage: DesktopTests
    displayName: 'Desktop Browser Tests'
    jobs:
      - job: ChromiumTests
        displayName: 'Chromium'
        pool:
          vmImage: 'ubuntu-latest'
        timeoutInMinutes: 30
        steps:
          - task: NodeTool@0
            displayName: 'Install Node.js $(NODE_VERSION)'
            inputs:
              versionSpec: $(NODE_VERSION)

          - task: Cache@2
            displayName: 'Cache npm packages'
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: 'npm | "$(Agent.OS)"'
              path: $(npm_config_cache)

          - script: npm ci
            displayName: 'Install dependencies'

          - script: npx playwright install --with-deps chromium
            displayName: 'Install Playwright Chromium'

          - script: npx playwright test --project=chromium
            displayName: 'Run Chromium tests'
            env:
              CI: 'true'

          - task: PublishTestResults@2
            displayName: 'Publish test results'
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'test-results/junit.xml'
              testRunTitle: 'Playwright E2E — Chromium'
              failTaskOnFailedTests: true

          - task: PublishPipelineArtifact@1
            displayName: 'Publish HTML report'
            condition: always()
            inputs:
              targetPath: 'playwright-report'
              artifact: 'playwright-report-chromium'
              publishLocation: 'pipeline'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish failure traces'
            condition: failed()
            inputs:
              targetPath: 'test-results'
              artifact: 'playwright-traces-chromium'
              publishLocation: 'pipeline'

      - job: FirefoxTests
        displayName: 'Firefox'
        pool:
          vmImage: 'ubuntu-latest'
        timeoutInMinutes: 30
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)

          - task: Cache@2
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: 'npm | "$(Agent.OS)"'
              path: $(npm_config_cache)

          - script: npm ci
            displayName: 'Install dependencies'

          - script: npx playwright install --with-deps firefox
            displayName: 'Install Playwright Firefox'

          - script: npx playwright test --project=firefox
            displayName: 'Run Firefox tests'
            env:
              CI: 'true'

          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'test-results/junit.xml'
              testRunTitle: 'Playwright E2E — Firefox'
              failTaskOnFailedTests: true

          - task: PublishPipelineArtifact@1
            condition: always()
            inputs:
              targetPath: 'playwright-report'
              artifact: 'playwright-report-firefox'
              publishLocation: 'pipeline'

      - job: WebKitTests
        displayName: 'WebKit (Safari)'
        pool:
          vmImage: 'ubuntu-latest'
        timeoutInMinutes: 30
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)

          - task: Cache@2
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: 'npm | "$(Agent.OS)"'
              path: $(npm_config_cache)

          - script: npm ci
            displayName: 'Install dependencies'

          - script: npx playwright install --with-deps webkit
            displayName: 'Install Playwright WebKit'

          - script: npx playwright test --project=webkit
            displayName: 'Run WebKit tests'
            env:
              CI: 'true'

          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'test-results/junit.xml'
              testRunTitle: 'Playwright E2E — WebKit'
              failTaskOnFailedTests: true

          - task: PublishPipelineArtifact@1
            condition: always()
            inputs:
              targetPath: 'playwright-report'
              artifact: 'playwright-report-webkit'
              publishLocation: 'pipeline'

  # ─── Mobile Browsers ─────────────────────────────────────────────────────────
  - stage: MobileTests
    displayName: 'Mobile Browser Tests'
    dependsOn: []   # Run in parallel with desktop
    jobs:
      - job: MobileTests
        displayName: 'Mobile Chrome + Safari'
        pool:
          vmImage: 'ubuntu-latest'
        timeoutInMinutes: 30
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)

          - task: Cache@2
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: 'npm | "$(Agent.OS)"'
              path: $(npm_config_cache)

          - script: npm ci
            displayName: 'Install dependencies'

          - script: npx playwright install --with-deps chromium webkit
            displayName: 'Install Playwright browsers'

          - script: npx playwright test --project=mobile-chrome --project=mobile-safari
            displayName: 'Run mobile tests'
            env:
              CI: 'true'

          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'test-results/junit.xml'
              testRunTitle: 'Playwright E2E — Mobile'
              failTaskOnFailedTests: true

          - task: PublishPipelineArtifact@1
            condition: always()
            inputs:
              targetPath: 'playwright-report'
              artifact: 'playwright-report-mobile'
              publishLocation: 'pipeline'
