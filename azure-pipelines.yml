# Azure DevOps Pipelines — BDD Playwright UI Tests for GDS Demo App
# Framework: playwright-bdd (Cucumber/Gherkin) + Page Object Model
# Target:    https://lokeshsharma99.github.io/GDS-Demo-App/

trigger:
  branches:
    include:
      - main
      - master
      - develop
  paths:
    include:
      - tests/**
      - playwright.config.ts
      - package*.json
      - azure-pipelines.yml

pr:
  branches:
    include:
      - main
      - master

schedules:
  - cron: '0 6 * * *'
    displayName: Daily smoke run (06:00 UTC)
    branches:
      include:
        - main
    always: true

parameters:
  - name: tagsFilter
    displayName: 'Cucumber tag filter (e.g. @smoke, @e2e, @validation — leave blank for all)'
    type: string
    default: ''
  - name: browsers
    displayName: 'Browsers to include in full regression'
    type: object
    default:
      - chromium
      - firefox
      - webkit

variables:
  NODE_VERSION: '20.x'
  npm_config_cache: $(Pipeline.Workspace)/.npm

stages:

  # Stage 1: Smoke Tests (PR gate - Chromium only, fast)
  - stage: SmokeTests
    displayName: 'Stage 1 - Smoke Tests (PR gate)'
    condition: eq(variables['Build.Reason'], 'PullRequest')
    jobs:
      - job: Smoke
        displayName: 'BDD @smoke - Chromium'
        pool:
          vmImage: 'ubuntu-latest'
        timeoutInMinutes: 15
        steps:
          - checkout: self
            fetchDepth: 1

          - task: NodeTool@0
            displayName: 'Use Node.js $(NODE_VERSION)'
            inputs:
              versionSpec: $(NODE_VERSION)

          - task: Cache@2
            displayName: 'Cache npm packages'
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: 'npm | "$(Agent.OS)"'
              path: $(npm_config_cache)

          - script: npm ci
            displayName: 'Install dependencies'

          - script: npx playwright install --with-deps chromium
            displayName: 'Install Playwright Chromium'

          - script: npx bddgen
            displayName: 'Generate BDD test files from .feature files'

          - script: npx playwright test --project=chromium --grep "@smoke"
            displayName: 'Run @smoke BDD scenarios'
            env:
              CI: 'true'

          - task: PublishTestResults@2
            displayName: 'Publish smoke test results'
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'test-results/junit.xml'
              testRunTitle: 'BDD Smoke - Chromium'
              failTaskOnFailedTests: true

          - task: PublishPipelineArtifact@1
            displayName: 'Upload smoke HTML report'
            condition: always()
            inputs:
              targetPath: 'playwright-report'
              artifact: 'smoke-report-chromium'
              publishLocation: 'pipeline'

          - task: PublishPipelineArtifact@1
            displayName: 'Upload failure traces (smoke)'
            condition: failed()
            inputs:
              targetPath: 'test-results'
              artifact: 'smoke-traces-chromium'
              publishLocation: 'pipeline'

  # Stage 2: Full BDD Regression (push / schedule / manual)
  - stage: FullRegression
    displayName: 'Stage 2 - Full BDD Regression'
    dependsOn: []
    condition: not(eq(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - job: BDDTests
        displayName: 'BDD Tests'
        strategy:
          matrix:
            Chromium:
              BROWSER: chromium
            Firefox:
              BROWSER: firefox
            WebKit:
              BROWSER: webkit
        pool:
          vmImage: 'ubuntu-latest'
        timeoutInMinutes: 30
        steps:
          - checkout: self
            fetchDepth: 1

          - task: NodeTool@0
            displayName: 'Use Node.js $(NODE_VERSION)'
            inputs:
              versionSpec: $(NODE_VERSION)

          - task: Cache@2
            displayName: 'Cache npm packages'
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: 'npm | "$(Agent.OS)"'
              path: $(npm_config_cache)

          - script: npm ci
            displayName: 'Install dependencies'

          - script: npx playwright install --with-deps $(BROWSER)
            displayName: 'Install Playwright $(BROWSER)'

          - script: npx bddgen
            displayName: 'Generate BDD test files from .feature files'

          - script: |
              GREP_ARG=""
              if [ -n "${{ parameters.tagsFilter }}" ]; then
                GREP_ARG="--grep ${{ parameters.tagsFilter }}"
              fi
              npx playwright test --project=$(BROWSER) $GREP_ARG
            displayName: 'Run BDD scenarios - $(BROWSER)'
            env:
              CI: 'true'

          - task: PublishTestResults@2
            displayName: 'Publish test results - $(BROWSER)'
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'test-results/junit.xml'
              testRunTitle: 'BDD Regression - $(BROWSER)'
              failTaskOnFailedTests: true

          - task: PublishPipelineArtifact@1
            displayName: 'Upload HTML report - $(BROWSER)'
            condition: always()
            inputs:
              targetPath: 'playwright-report'
              artifact: 'playwright-report-$(BROWSER)'
              publishLocation: 'pipeline'

          - task: PublishPipelineArtifact@1
            displayName: 'Upload failure traces - $(BROWSER)'
            condition: failed()
            inputs:
              targetPath: 'test-results'
              artifact: 'playwright-traces-$(BROWSER)'
              publishLocation: 'pipeline'
